name: CD Pipeline for Render

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    
    # Needs block ensures this only runs if your CI passes (if they share the same workflow file)
    # If they are in separate files like they are now, you can keep them separate. Render deployment happens on merge to main.

    steps:
      - name: Hit Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set in GitHub Settings."
            exit 1
          fi
          
          # This sends a POST request to the Render Hook URL, which triggers Render to start a build/deployment.
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deployment triggered on Render successfully."
